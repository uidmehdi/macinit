---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install yamllint ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint .

  test-packages:
    name: Test — packages
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible molecule
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule packages scenario
        run: molecule test -s packages
        env:
          ANSIBLE_BECOME_ASK_PASS: "false"

  test-dotfiles:
    name: Test — dotfiles
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible molecule
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule dotfiles scenario
        run: molecule test -s dotfiles
        env:
          ANSIBLE_BECOME_ASK_PASS: "false"

  test-full:
    name: Test — full role
    runs-on: macos-latest
    needs: [test-packages, test-dotfiles]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible molecule
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule default scenario
        run: molecule test
        env:
          ANSIBLE_BECOME_ASK_PASS: "false"
