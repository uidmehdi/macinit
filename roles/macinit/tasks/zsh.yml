---
- name: Check zsh completion directories
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ zsh_compinit_permission_dirs }}"
  register: zsh_completion_dirs
  tags: [zsh, dotfiles]

- name: Remove group/world write permissions from zsh completion directories
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    mode: "go-w"
    recurse: true
  loop: "{{ zsh_completion_dirs.results }}"
  when: item.stat.exists
  tags: [zsh, dotfiles]

- name: Audit zsh compinit insecure paths
  ansible.builtin.command: /bin/zsh -lic 'autoload -Uz compaudit; compaudit'
  register: zsh_compaudit
  changed_when: false
  failed_when: false
  tags: [zsh, dotfiles]

- name: Remove group/world write permissions from compaudit paths
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "go-w"
    recurse: true
  loop: "{{ zsh_compaudit.stdout_lines }}"
  when: item | length > 0
  tags: [zsh, dotfiles]

- name: Find stale zsh completion caches
  ansible.builtin.find:
    paths: "{{ ansible_facts['user_dir'] }}"
    patterns: ".zcompdump*"
    hidden: true
    file_type: file
  register: zsh_compdump_files
  tags: [zsh, dotfiles]

- name: Remove stale zsh completion caches
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ zsh_compdump_files.files }}"
  tags: [zsh, dotfiles]
